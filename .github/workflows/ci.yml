name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e ".[test]"
      - name: Lint
        run: ruff check src tests examples
      - name: Type check
        run: mypy
      - name: Run tests with coverage
        run: pytest --cov=agenttrust --cov-report=term-missing

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel
        run: |
          python -m pip install build
          python -m build
      - name: Install wheel and smoke test
        run: |
          python -m venv .smoke-venv
          .smoke-venv/bin/python -m pip install dist/*.whl
          .smoke-venv/bin/agenttrust --help
          .smoke-venv/bin/python -c "from agenttrust.interfaces.python_api import AgentTrustRuntime; print(AgentTrustRuntime)"

  optional-otel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install OpenTelemetry extra
        run: python -m pip install -e ".[test,otel]"
      - name: Test evidence export
        run: pytest tests/test_otel_export.py
