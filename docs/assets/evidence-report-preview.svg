<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Example AgentTrust evidence report</title>
  <desc id="desc">A stylized report preview with a verified trace, policy snapshot, tool result, and GroundGuard result.</desc>
  <defs>
    <style>
      .heading { font: 700 27px Arial, sans-serif; fill: #102A43; }
      .subheading { font: 700 18px Arial, sans-serif; fill: #102A43; }
      .copy { font: 15px Arial, sans-serif; fill: #486581; }
      .mono { font: 14px Consolas, monospace; fill: #243B53; }
      .ok { font: 700 15px Arial, sans-serif; fill: #047857; }
      .top-heading { font: 700 27px Arial, sans-serif; fill: #FFFFFF; }
      .top-copy { font: 15px Arial, sans-serif; fill: #D9E2EC; }
      .terminal { font: 14px Consolas, monospace; fill: #D9E2EC; }
      .terminal-ok { font: 14px Consolas, monospace; fill: #A7F3D0; }
    </style>
  </defs>
  <rect width="1200" height="650" rx="18" fill="#F8FAFC"/>
  <rect x="34" y="30" width="1132" height="590" rx="12" fill="#FFFFFF" stroke="#D9E2EC" stroke-width="2"/>
  <rect x="34" y="30" width="1132" height="72" rx="12" fill="#102A43"/>
  <circle cx="72" cy="66" r="9" fill="#F59E0B"/><circle cx="100" cy="66" r="9" fill="#14B8A6"/><circle cx="128" cy="66" r="9" fill="#E76F51"/>
  <text x="164" y="74" class="top-heading">AgentTrust evidence report</text>
  <text x="1068" y="74" text-anchor="end" class="top-copy">run_20260713_...</text>
  <text x="72" y="144" class="subheading">Run summary</text>
  <rect x="72" y="164" width="245" height="106" rx="8" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="94" y="198" class="copy">Evidence chain</text><text x="94" y="232" class="ok">VERIFIED</text><text x="94" y="252" class="mono">11 events</text>
  <rect x="337" y="164" width="245" height="106" rx="8" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="359" y="198" class="copy">Policy</text><text x="359" y="232" class="ok">SNAPSHOT SAVED</text><text x="359" y="252" class="mono">sha256:...</text>
  <rect x="602" y="164" width="245" height="106" rx="8" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="624" y="198" class="copy">Tool result</text><text x="624" y="232" class="ok">SUCCEEDED</text><text x="624" y="252" class="mono">shell (fixture)</text>
  <rect x="867" y="164" width="245" height="106" rx="8" fill="#F5F3FF" stroke="#DDD6FE"/>
  <text x="889" y="198" class="copy">GroundGuard</text><text x="889" y="232" class="ok">VERIFIED</text><text x="889" y="252" class="mono">fact:revenue</text>
  <text x="72" y="324" class="subheading">Timeline</text>
  <path d="M122 359v186" stroke="#9FB3C8" stroke-width="3"/>
  <circle cx="122" cy="376" r="10" fill="#0369A1"/><circle cx="122" cy="430" r="10" fill="#0F766E"/><circle cx="122" cy="484" r="10" fill="#D97706"/><circle cx="122" cy="538" r="10" fill="#7C3AED"/>
  <text x="156" y="382" class="mono">run_started</text><text x="360" y="382" class="copy">session, actor, and runtime mode recorded</text>
  <text x="156" y="436" class="mono">tool_result</text><text x="360" y="436" class="copy">controlled tool output mapped to facts</text>
  <text x="156" y="490" class="mono">final_answer</text><text x="360" y="490" class="copy">required facts checked against this session</text>
  <text x="156" y="544" class="mono">run_completed</text><text x="360" y="544" class="copy">terminal state appended to hash-linked trace</text>
  <rect x="750" y="330" width="362" height="226" rx="8" fill="#102A43"/>
  <text x="778" y="365" class="terminal">agenttrust evidence verify &lt;run_id&gt;</text>
  <text x="778" y="404" class="terminal-ok">{</text>
  <text x="798" y="432" class="terminal-ok">"valid": true,</text>
  <text x="798" y="460" class="terminal-ok">"event_count": 11,</text>
  <text x="798" y="488" class="terminal-ok">"head_hash": "sha256:..."</text>
  <text x="778" y="516" class="terminal-ok">}</text>
</svg>
