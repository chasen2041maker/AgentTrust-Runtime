<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">AgentTrust Runtime control flow</title>
  <desc id="desc">A diagram that shows agent frameworks passing through AgentTrust policy, approval, sandbox, and tool controls before producing evidence, recovery artifacts, and GroundGuard checks.</desc>
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #102A43; }
      .label { font: 700 18px Arial, sans-serif; fill: #102A43; }
      .copy { font: 15px Arial, sans-serif; fill: #486581; }
      .small { font: 13px Arial, sans-serif; fill: #486581; }
      .arrow { stroke: #627D98; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0 9 3 0 6Z" fill="#627D98"/></marker>
  </defs>
  <rect width="1200" height="430" rx="18" fill="#F8FAFC"/>
  <text x="600" y="52" text-anchor="middle" class="title">Governed execution without replacing your agent framework</text>
  <rect x="44" y="116" width="222" height="112" rx="10" fill="#E0F2FE" stroke="#0369A1" stroke-width="2"/>
  <text x="155" y="157" text-anchor="middle" class="label">Agent framework</text>
  <text x="155" y="184" text-anchor="middle" class="copy">OpenAI Agents · LangGraph</text>
  <text x="155" y="206" text-anchor="middle" class="copy">MCP · custom Python</text>
  <path d="M266 172h72" class="arrow"/>
  <rect x="340" y="83" width="515" height="180" rx="12" fill="#ECFDF5" stroke="#0F766E" stroke-width="3"/>
  <text x="597" y="121" text-anchor="middle" class="label">AgentTrust Runtime</text>
  <rect x="370" y="149" width="100" height="72" rx="8" fill="#FFFFFF" stroke="#14B8A6"/>
  <text x="420" y="180" text-anchor="middle" class="small">Policy</text>
  <text x="420" y="201" text-anchor="middle" class="small">allow / ask / deny</text>
  <rect x="490" y="149" width="100" height="72" rx="8" fill="#FFFFFF" stroke="#14B8A6"/>
  <text x="540" y="180" text-anchor="middle" class="small">Approval</text>
  <text x="540" y="201" text-anchor="middle" class="small">resume bound args</text>
  <rect x="610" y="149" width="100" height="72" rx="8" fill="#FFFFFF" stroke="#14B8A6"/>
  <text x="660" y="180" text-anchor="middle" class="small">Controls</text>
  <text x="660" y="201" text-anchor="middle" class="small">path · argv · MCP</text>
  <rect x="730" y="149" width="95" height="72" rx="8" fill="#FFFFFF" stroke="#14B8A6"/>
  <text x="777" y="180" text-anchor="middle" class="small">Tool</text>
  <text x="777" y="201" text-anchor="middle" class="small">execute</text>
  <path d="M855 172h72" class="arrow"/>
  <rect x="929" y="116" width="222" height="112" rx="10" fill="#FFF7ED" stroke="#D97706" stroke-width="2"/>
  <text x="1040" y="157" text-anchor="middle" class="label">Real tool</text>
  <text x="1040" y="184" text-anchor="middle" class="copy">files · shell argv</text>
  <text x="1040" y="206" text-anchor="middle" class="copy">MCP · Python callable</text>
  <path d="M597 263v65" class="arrow"/>
  <rect x="190" y="330" width="820" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="600" y="358" text-anchor="middle" class="label">Verified local evidence</text>
  <text x="600" y="381" text-anchor="middle" class="copy">hash-linked JSONL · SQLite rebuild · report · recovery · OpenTelemetry · GroundGuard fact check</text>
</svg>
